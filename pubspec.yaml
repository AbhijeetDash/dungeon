name: dungeon
description: "QuickSlot — book sports slots without double-booking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (BLoC) — the brief asks us to justify this choice.
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Networking to our REST API. Dio is used for its interceptor pipeline:
  # request-structure validation, response-structure validation, and dev logging.
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
