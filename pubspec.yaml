name: dungeon
description: "QuickSlot — book sports slots without double-booking."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (BLoC).
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Networking (interceptors: auth, request/response validation, dev logging).
  dio: ^5.9.2

  # Model (de)serialization — codegen via json_serializable.
  json_annotation: ^4.11.0

  # Firebase Authentication (email/password + Google via signInWithProvider).
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen for *.g.dart (run: dart run build_runner build).
  build_runner: ^2.15.0
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
